name: ShellCast
options:
  bundleIdPrefix: com.scrappylabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ShellCast:
    type: application
    platform: iOS
    sources:
      - ShellCast
    entitlements:
      path: ShellCast/ShellCast.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        INFOPLIST_FILE: ShellCast/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.scrappylabs.shellcast
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: ShellCast
        CODE_SIGN_STYLE: Automatic
        ALWAYS_SEARCH_USER_PATHS: NO
    info:
      path: ShellCast/Info.plist
      properties:
        CFBundleDisplayName: "ShellCast"
        CFBundleName: ShellCast
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: "BackgroundColor"
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: "ShellCast connects to your relay server to receive audio."
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
